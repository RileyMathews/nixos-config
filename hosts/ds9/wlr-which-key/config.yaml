# Theming
font: JetBrainsMono Nerd Font 24
background: "#282828d0"
color: "#fbf1c7"
border: "#8ec07c"
separator: " ➜ "
border_width: 2
corner_r: 10
padding: 40 # Defaults to corner_r
rows_per_column: 5 # No limit by default

# Anchor and margin
# anchor: center # One of center, left, right, top, bottom, bottom-left, top-left, etc.
# Only relevant when anchor is not center
# margin_right: 0
# margin_bottom: 0
# margin_left: 0
# margin_top: 0

# namespace to use for the layer shell surface
# namespace: "wlr_which_key"

# Permits key bindings that conflict with compositor key bindings.
# Default is `false`.
inhibit_compositor_keyboard_shortcuts: true

# Try to guess the correct keyboard layout to use. Default is `false`.
auto_kbd_layout: true

menu:
  - key: "p"
    desc: Power
    submenu:
      - key: "s"
        desc: Sleep
        cmd: systemctl suspend
      - key: "r"
        desc: Reboot
        cmd: reboot
      - key: "o"
        desc: Off
        cmd: poweroff
  - key: "g"
    desc: Window Group Management
    submenu:
      - key: "t"
        desc: Toggle group from currently focused window
        cmd: hyprctl dispatch togglegroup
