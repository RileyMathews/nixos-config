web:
  port: 8020

storage:
  type: postgres
  path: "postgres://gatus:${POSTGRES_PASSWORD}@pg17.tailscale.rileymathews.com:5432/gatus?sslmode=disable"


endpoint-defaults: &defaults
  group: Services
  interval: 30s
  client:
    timeout: 10s
  conditions:
    - "[STATUS] == 200"
    - "[CERTIFICATE_EXPIRATION] > 72h"
  alerts:
    - type: ntfy

alerting:
  ntfy:
    topic: "home-server-alerts"
    priority: 3
    url: "https://ntfy.rileymathews.com"
    default-alert:
      failure-threshold: 3
      send-on-resolved: true
      minimum-reminder-interval: 1h


endpoints:
  - name: rpgweave
    <<: *defaults
    url: "https://rpgweave.com/health_check"

  - name: vaultwarden
    <<: *defaults
    url: "https://vaultwarden.rileymathews.com"

  - name: homeassistant
    <<: *defaults
    url: "https://home.rileymathews.com"

  - name: mealie
    <<: *defaults
    url: "https://mealie.rileymathews.com"

  - name: forgejo
