[metadata]
name = "find-code"
description = "A channel to select from directories"
requirements = ["find"]

[source]
command = ["find $HOME/code $HOME/.config $HOME/worktrees -mindepth 1 -maxdepth 1 -type d"]

[preview]
command = "ls -la --color=always '{}'"

[keybindings]
shortcut = "f2"

[actions.cd]
description = "Open a shell in the selected directory"
command = "cd '{}'"
mode = "execute"

[actions.goto_parent_dir]
description = "Re-opens tv in the parent directory"
command = "tv dirs .."
mode = "execute"
